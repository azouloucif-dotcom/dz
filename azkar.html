<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#1F5D4E">
    <title>الأذكار والاقتباسات - منصة azou loucif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&family=Reem+Kufi:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F3F5EE; --card: #FFFFFF; --ink: #16241D; --ink-soft: #566354;
            --forest: #1F5D4E; --forest-dark: #143F35; --gold: #C8932F; --gold-soft: #F6E7C6;
            --line: #DDE3D5; --shadow-sm: 0 2px 10px rgba(22,36,29,0.07); --shadow-md: 0 8px 24px rgba(22,36,29,0.12);
            --header-gradient: linear-gradient(135deg, #1F5D4E, #143F35);
            --footer-gradient: linear-gradient(160deg, #143F35, #0E1B16);
            --tab-active-bg: #1F5D4E; --tab-inactive-bg: #fff; --tab-inactive-text: #566354;
            --zekr-bg: #F9FBF7; --zekr-border: #C8932F; --count-color: #1F5D4E;
            --quote-bg: #fff; --quote-border: #C8932F;
            --footer-text: #CFE0D6;
        }
        [data-theme="dark"] {
            --bg: #0F1A14; --card: #1C2A23; --ink: #EBE7DB; --ink-soft: #9BACA4;
            --forest: #3A8B76; --forest-dark: #22634D; --gold: #D9B554; --gold-soft: #3E3A22;
            --line: #2B3D34; --shadow-sm: 0 2px 10px rgba(0,0,0,0.2); --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --header-gradient: linear-gradient(135deg, #1B4332, #0D211A);
            --footer-gradient: linear-gradient(160deg, #0D211A, #060E0B);
            --tab-active-bg: #3A8B76; --tab-inactive-bg: #1C2A23; --tab-inactive-text: #9BACA4;
            --zekr-bg: #1E2A24; --zekr-border: #D9B554; --count-color: #D9B554;
            --quote-bg: #1C2A23; --quote-border: #D9B554;
            --footer-text: #A3B0A8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg); color: var(--ink); font-family: 'Tajawal', sans-serif;
            line-height: 1.8; transition: background-color 0.35s, color 0.35s;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        .sprite-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
        .seal { color: var(--gold); }

        header {
            background: var(--header-gradient); color: #fff; padding: 14px 0;
            position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 14px rgba(0,0,0,0.12);
        }
        .nav-container {
            width: 90%; max-width: 1200px; margin: auto;
            display: flex; justify-content: space-between; align-items: center;
            gap: 10px; flex-wrap: wrap;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 16px; font-weight: 600; font-family: 'Reem Kufi', sans-serif;
        }
        .nav-actions { display: flex; align-items: center; gap: 8px; }
        .back-link {
            color: #fff; text-decoration: none; background: rgba(255,255,255,0.12);
            padding: 8px 14px; border-radius: 20px; font-weight: 600; font-size: 13px;
            border: 1px solid rgba(255,255,255,0.2); white-space: nowrap;
            transition: background 0.25s;
        }
        .back-link:hover { background: rgba(255,255,255,0.24); }
        .theme-toggle {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; width: 38px; height: 38px; border-radius: 50%; cursor: pointer;
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: .25s; flex-shrink: 0;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.24); transform: rotate(15deg); }

        .main-content { flex: 1; width: 90%; max-width: 900px; margin: 30px auto; }

        .page-title {
            font-family: 'Amiri', serif; font-size: 32px; color: var(--forest);
            margin-bottom: 8px; text-align: center;
        }
        .page-subtitle { color: var(--ink-soft); font-size: 15px; text-align: center; margin-bottom: 25px; }

        .tab-nav {
            display: flex; gap: 4px; background: var(--line); border-radius: 14px;
            padding: 5px; margin-bottom: 30px; overflow-x: auto;
        }
        .tab-btn {
            flex: 1; padding: 12px 16px; border: none; background: var(--tab-inactive-bg);
            color: var(--tab-inactive-text); font-weight: 700; font-size: 16px;
            cursor: pointer; border-radius: 10px; font-family: 'Tajawal', sans-serif;
            white-space: nowrap; transition: background 0.3s, color 0.3s;
        }
        .tab-btn.active { background: var(--tab-active-bg); color: #fff; }

        .azkar-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }

        .zekr-card {
            background: var(--card); border-radius: 14px; padding: 20px;
            box-shadow: var(--shadow-sm); border-right: 5px solid var(--zekr-border);
            transition: box-shadow 0.25s, transform 0.25s;
        }
        .zekr-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

        .zekr-text { font-size: 17px; line-height: 2.1; margin-bottom: 12px; }
        .zekr-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .zekr-count {
            display: inline-flex; align-items: center; gap: 5px;
            background: var(--gold-soft); color: var(--count-color);
            padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 700;
        }
        .zekr-reference { font-size: 12px; color: var(--ink-soft); font-style: italic; }

        .quotes-section {
            background: var(--card); border-radius: 18px; padding: 24px;
            box-shadow: var(--shadow-md); border: 1px solid var(--line);
            text-align: center; margin-top: 30px;
        }
        .section-title {
            font-family: 'Amiri', serif; font-size: 26px; color: var(--forest); margin-bottom: 18px;
        }
        .quote-box {
            background: var(--quote-bg); border-radius: 14px; padding: 24px;
            min-height: 100px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; line-height: 2; border-right: 5px solid var(--quote-border);
            transition: opacity 0.3s; margin-bottom: 16px;
        }
        .quote-nav { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .quote-arrow {
            background: var(--forest); color: #fff; width: 44px; height: 44px;
            border-radius: 50%; border: none; font-size: 22px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.25s, transform 0.2s;
        }
        .quote-arrow:hover { background: var(--forest-dark); transform: scale(1.1); }
        .quote-counter { font-weight: 600; color: var(--gold); font-size: 15px; }

        footer {
            background: var(--footer-gradient); color: var(--footer-text);
            text-align: center; padding: 25px 15px; margin-top: 40px;
            border-top: 3px solid var(--gold); font-size: 13px;
        }

        /* ========== تحسينات الهاتف ========== */
        @media screen and (max-width: 768px) {
            .nav-container { flex-direction: column; align-items: flex-start; }
            .nav-actions { width: 100%; justify-content: space-between; }
            .page-title { font-size: 26px; }
            .tab-btn { font-size: 14px; padding: 10px 12px; }
            .zekr-text { font-size: 16px; }
            .quote-box { font-size: 16px; padding: 18px; }
            .quote-arrow { width: 40px; height: 40px; font-size: 20px; }
        }
        @media screen and (max-width: 480px) {
            .main-content { width: 95%; }
            .tab-nav { border-radius: 12px; padding: 4px; }
            .tab-btn { font-size: 13px; padding: 8px 10px; }
            .zekr-card { padding: 16px; border-radius: 12px; }
            .zekr-text { font-size: 15px; line-height: 1.9; }
            .page-title { font-size: 24px; }
            .section-title { font-size: 22px; }
        }
    </style>
</head>
<body>
    <svg class="sprite-defs"><symbol id="seal-emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="50" cy="50" r="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 4"/><path d="M50 28 L59 45 L78 47 L63 60 L67 79 L50 69 L33 79 L37 60 L22 47 L41 45 Z" fill="currentColor"/></symbol></svg>

    <div class="main-content">

        <div class="tab-nav">

            <h2 class="section-title">💬 اقتباسات تحفيزية</h2>
            <div class="quote-box" id="quoteText"></div>
            <div class="quote-nav">
                <button class="quote-arrow" onclick="prevQuote()">❮</button>
                <span class="quote-counter" id="quoteCounter"></span>

        </div>

        <p>© 2026 منصة azou loucif | جميع الحقوق محفوظة</p>

    <script>
        // ---- نظام الوضع الليلي الموحد ----
        const THEME_KEY = 'azou-loucif-theme';
        const htmlEl = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function getSavedTheme() { return localStorage.getItem(THEME_KEY) || 'light'; }
        function applyTheme(t) {
            htmlEl.setAttribute('data-theme', t);
            if (themeToggle) themeToggle.textContent = t === 'dark' ? '☀️' : '🌙';
            localStorage.setItem(THEME_KEY, t);
        }
        applyTheme(getSavedTheme());
        themeToggle.addEventListener('click', () => {
            const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            applyTheme(next);
        });
        window.addEventListener('storage', (e) => {
            if (e.key === THEME_KEY) applyTheme(e.newValue || 'light');
        });

        function renderAzkar(data, containerId) {
            document.getElementById(containerId).innerHTML = data.map(z => `
                <div class="zekr-card">
                    <div class="zekr-text">${z.text}</div>
                    <div class="zekr-meta">
                        <span class="zekr-count">🔄 ${z.count}</span>
                        <span class="zekr-reference">📖 ${z.ref}</span>
                    </div>
                </div>`).join('');
        }

        renderAzkar(morningAzkarData, 'morningAzkar');
        renderAzkar(eveningAzkarData, 'eveningAzkar');

        function switchTab(tab) {
            document.getElementById('tabMorning').classList.toggle('active', tab === 'morning');
            document.getElementById('tabEvening').classList.toggle('active', tab === 'evening');
            document.getElementById('morningAzkar').style.display = tab === 'morning' ? 'flex' : 'none';
            document.getElementById('eveningAzkar').style.display = tab === 'evening' ? 'flex' : 'none';
        }

        const quotes = [
            "لا تنتظر أن تصبح جاهزاً، ابدأ الآن.",
            "النجاح ليس نهاية الطريق، والفشل ليس قاتلاً.",
            "كل يوم هو فرصة جديدة.",
            "العلم نور، والاجتهاد يرفع صاحبه.",
            "لا تؤجل عمل اليوم إلى الغد.",
            "الأمل أن ترى النور حتى في أحلك الظروف.",
            "بالصبر والتوكل على الله تتحقق الأماني.",
            "إذا لم تجد طريقاً فاصنع طريقاً.",
            "التميز ليس فعلاً واحداً بل عادة يومية.",
            "اسعَ ولا تيأس."
        ];
        let currentQuote = 0;
        const quoteEl = document.getElementById('quoteText');
        const counterEl = document.getElementById('quoteCounter');

        function showQuote(index) {
            quoteEl.style.opacity = 0;
            setTimeout(() => {
                quoteEl.textContent = quotes[index];
                counterEl.textContent = `${index+1}/${quotes.length}`;
                quoteEl.style.opacity = 1;
            }, 150);
        }
        function nextQuote() { currentQuote = (currentQuote+1) % quotes.length; showQuote(currentQuote); }
        function prevQuote() { currentQuote = (currentQuote-1+quotes.length) % quotes.length; showQuote(currentQuote); }
        showQuote(0);
