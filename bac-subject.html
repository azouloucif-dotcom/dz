<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بكالوريات سابقة - منصة azou loucif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;800&family=Reem+Kufi:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F3F5EE; --card: #FFFFFF; --ink: #16241D; --ink-soft: #566354;
            --forest: #1F5D4E; --forest-dark: #143F35; --gold: #C8932F; --gold-soft: #F6E7C6;
            --line: #DDE3D5; --shadow-sm: 0 2px 10px rgba(22,36,29,0.07); --shadow-md: 0 8px 24px rgba(22,36,29,0.12);
            --header-gradient: linear-gradient(135deg, #1F5D4E, #143F35);
            --footer-gradient: linear-gradient(160deg, #143F35, #0E1B16);
        }
        [data-theme="dark"] {
            --bg: #0F1A14; --card: #1C2A23; --ink: #EBE7DB; --ink-soft: #9BACA4;
            --forest: #3A8B76; --forest-dark: #22634D; --gold: #D9B554; --gold-soft: #3E3A22;
            --line: #2B3D34; --shadow-sm: 0 2px 10px rgba(0,0,0,0.2); --shadow-md: 0 8px 24px rgba(0,0,0,0.3);
            --header-gradient: linear-gradient(135deg, #1B4332, #0D211A);
            --footer-gradient: linear-gradient(160deg, #0D211A, #060E0B);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--ink); font-family: 'Tajawal', sans-serif; line-height: 1.8; transition: 0.35s; min-height: 100vh; display: flex; flex-direction: column; }
        .sprite-defs { position: absolute; width: 0; height: 0; overflow: hidden; }
        .seal { color: var(--gold); }
        header { background: var(--header-gradient); color: #fff; padding: 14px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 14px rgba(0,0,0,0.12); }
        .nav-container { width: 90%; max-width: 1200px; margin: auto; display: flex; justify-content: space-between; align-items: center; gap: 14px; flex-wrap: wrap; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 600; font-family: 'Reem Kufi', sans-serif; }
        .back-link { color: #fff; text-decoration: none; background: rgba(255,255,255,0.12); padding: 8px 18px; border-radius: 20px; font-size: 14px; }
        .back-link:hover { background: rgba(255,255,255,0.24); }
        .theme-toggle { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: #fff; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; }
        .main-content { flex: 1; width: 90%; max-width: 900px; margin: 40px auto; }
        .page-title { font-family: 'Amiri', serif; font-size: 32px; color: var(--forest); text-align: center; margin-bottom: 30px; }
        .subjects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .subject-card { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 24px 16px; text-align: center; box-shadow: var(--shadow-sm); transition: 0.2s; }
        .subject-icon { font-size: 40px; margin-bottom: 8px; }
        .subject-name { font-weight: 700; font-size: 16px; margin-bottom: 12px; }
        .btn-visit { background: var(--forest); color: #fff; padding: 10px 18px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
        .btn-visit:hover { background: var(--forest-dark); }
        footer { background: var(--footer-gradient); color: #CFE0D6; text-align: center; padding: 30px 0; margin-top: 60px; border-top: 3px solid var(--gold); }
    </style>
</head>
<body>
    <svg class="sprite-defs"><symbol id="seal-emblem" viewBox="0 0 100 100"><circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="50" cy="50" r="36" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="2 4"/><path d="M50 28 L59 45 L78 47 L63 60 L67 79 L50 69 L33 79 L37 60 L22 47 L41 45 Z" fill="currentColor"/></symbol></svg>
    <header>
        <div class="nav-container">
            <div class="logo"><svg class="seal" width="28" height="28"><use href="#seal-emblem"/></svg><span>منصة azou loucif</span></div>
            <div style="display:flex; gap:10px; align-items:center;">
                <a href="index.html" class="back-link">← العودة للمنصة</a>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>
    </header>
    <div class="main-content">
        <h1 class="page-title">📚 بكالوريات سابقة</h1>
        <div class="subjects-grid" id="subjectsGrid"></div>
    </div>
    <footer><p>© 2026 منصة azou loucif</p></footer>
    <script>
        const THEME_KEY = 'azou-loucif-theme';
        const htmlEl = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        function applyTheme(t) {
            htmlEl.setAttribute('data-theme', t);
            themeToggle.textContent = t === 'dark' ? '☀️' : '🌙';
            localStorage.setItem(THEME_KEY, t);
        }
        applyTheme(localStorage.getItem(THEME_KEY) || 'light');
        themeToggle.addEventListener('click', () => {
            applyTheme(htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        });
        window.addEventListener('storage', e => {
            if (e.key === THEME_KEY) applyTheme(e.newValue || 'light');
        });

        // قائمة المواد مع روابط dzexams الصحيحة
        const subjects = [
            { name: 'الرياضيات', icon: '📐', url: 'https://www.dzexams.com/ar/bac/mathematiques' },
            { name: 'الفيزياء', icon: '⚡', url: 'https://www.dzexams.com/ar/bac/physique' },
            { name: 'علوم الطبيعة', icon: '🧬', url: 'https://www.dzexams.com/ar/bac/sciences-naturelles' },
            { name: 'اللغة العربية', icon: '📖', url: 'https://www.dzexams.com/ar/bac/arabe' },
            { name: 'العلوم الإسلامية', icon: '☪️', url: 'https://www.dzexams.com/ar/bac/tarbia-islamia' },
            { name: 'التاريخ والجغرافيا', icon: '🌍', url: 'https://www.dzexams.com/ar/bac/histoire-geographie' },
            { name: 'الفلسفة', icon: '💭', url: 'https://www.dzexams.com/ar/bac/philosophie' },
            { name: 'الإنجليزية', icon: '🇬🇧', url: 'https://www.dzexams.com/ar/bac/anglais' },
            { name: 'الفرنسية (شعب علمية)', icon: '🇫🇷', url: 'https://www.dzexams.com/ar/bac/francais/sci' }
        ];

        document.getElementById('subjectsGrid').innerHTML = subjects.map(s => `
            <div class="subject-card">
                <div class="subject-icon">${s.icon}</div>
                <div class="subject-name">${s.name}</div>
                <a href="${s.url}" target="_blank" class="btn-visit">📂 تصفح المادة</a>
            </div>
        `).join('');
    </script>
</body>
</html>
